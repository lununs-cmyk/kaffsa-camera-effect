<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>SOOP Camera</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ==========================================================
         App
    =========================================================== -->

    <div id="app">

        <!-- ======================================================
             Phone
        ======================================================= -->

        <div id="phone">

            <!-- ==============================================
                 Camera UI
            =============================================== -->

            <div id="cameraUi">

                <!-- Header -->

                <header id="header">

                    <div class="header-left">

                        📷

                    </div>

                    <div class="header-title">

                        Camera

                    </div>

                    <div class="header-right">

                    </div>

                </header>

                <!-- ==========================
                     Preview
                =========================== -->

                <main id="preview">

                    <!-- Photo -->

                    <img
                        id="mainImage"
                        draggable="false"
                        alt="Photo">

                    <!-- Flash -->

                    <div id="flash"></div>

                    <!-- Blur Overlay (추후 사용) -->

                    <div id="blurOverlay"></div>

                    <!-- Grid -->

                    <div id="gridOverlay">

                        <div class="v line1"></div>
                        <div class="v line2"></div>

                        <div class="h line1"></div>
                        <div class="h line2"></div>

                    </div>

                    <!-- Focus Box -->

                    <div id="focusBox">

                        <div class="corner tl"></div>
                        <div class="corner tr"></div>
                        <div class="corner bl"></div>
                        <div class="corner br"></div>

                    </div>

                </main>

                <!-- ==========================
                     Bottom
                =========================== -->

                <footer id="bottomBar">

                    <!-- Thumbnail -->

                    <div id="thumbnail">

                        <div id="thumbImage"></div>

                    </div>

                    <!-- Shutter -->

                    <button
                        id="shutterBtn"
                        aria-label="Shutter">

                    </button>

                    <!-- Gallery -->

                    <div id="galleryButton">

                    </div>

                </footer>

            </div>

            <!-- ==============================================
                 Result Viewer
            =============================================== -->

            <div id="photoViewer">

                <img
                    id="resultImage"
                    draggable="false"
                    alt="Result">

                <div id="viewerButtons">

                    <button id="saveBtn">

                        저장

                    </button>

                    <button id="retryBtn">

                        다시 촬영

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- ======================================================
         Script
    ======================================================= -->

    <script src="config.js"></script>

    <script src="script.js"></script>

</body>

</html>
