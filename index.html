<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>SOOP 방셀 제작기 v5.0.5</title>

  <style>
    :root {
      --yellow: #ffd60a;
      --ui-white: rgba(255,255,255,.94);
      --ui-dim: rgba(255,255,255,.70);
      --ease-out: cubic-bezier(.16,1,.3,1);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-width: 450px;
      min-height: 800px;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Helvetica, Arial, sans-serif;
      user-select: none;
    }

    body {
      display: grid;
      place-items: center;
    }

    button {
      appearance: none;
      border: 0;
      padding: 0;
      font: inherit;
    }

    .app {
      --u: 4.5px;
      --initial-blur: 7px;

      position: relative;
      width: 450px;
      height: 800px;
      margin: 0;
      overflow: hidden;
      background: #000;
      box-shadow: none;
      isolation: isolate;
    }

    .app.captured {
      width: 450px;
      height: 800px;
      box-shadow: none;
    }

    .stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #000;
    }

    .photo-frame {
      position: absolute;
      left: 50%;
      top: 45%;
      width: 100%;
      aspect-ratio: 1 / 1;
      transform: translate(-50%, -50%);
      overflow: hidden;
      background: #050505;
      z-index: 1;
      will-change: inset, width, height, top, transform;
    }

    .app.captured .photo-frame {
      top: 50%;
      width: 450px;
      height: 800px;
      aspect-ratio: auto;
      overflow: hidden;
    }

    .photo {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transform: scale3d(1.075, 1.075, 1);
      filter: blur(var(--initial-blur)) brightness(.91) saturate(.92);
      opacity: 0;
      transition: opacity .35s ease;
      will-change: transform, filter;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .photo.loaded {
      opacity: 1;
      animation: idle-drift 7s ease-in-out infinite;
    }

    .app.captured .photo {
      object-fit: contain;
      animation: capture-reveal 1.15s var(--ease-out) both;
    }

    /* 촬영 효과가 끝난 뒤 유지되는 최종 선명 사진 상태 */
    .app.captured .photo.sharp-final {
      animation: none !important;
      transform: scale3d(1,1,1) !important;
      filter:
        url("#soop-sharpen")
        contrast(1.07)
        saturate(1.04)
        brightness(1.02) !important;
      opacity: 1 !important;
    }

    @keyframes idle-drift {
      0%, 100% { transform: scale3d(1.075,1.075,1) translate3d(0,0,0); }
      50% { transform: scale3d(1.105,1.105,1) translate3d(-.7%,.7%,0); }
    }

    @keyframes capture-reveal {
      0% {
        transform: scale3d(.72,.72,1);
        filter: blur(10px) brightness(.98) saturate(.9);
      }
      34% {
        filter: blur(2.2px) brightness(1.04) saturate(1);
      }
      100% {
        transform: scale3d(1,1,1);
        filter:
          url("#soop-sharpen")
          contrast(1.055)
          saturate(1.035)
          brightness(1.015);
      }
    }

    .grid {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background-image:
        linear-gradient(90deg,
          transparent 33.15%,
          rgba(255,255,255,.27) 33.15%,
          rgba(255,255,255,.27) 33.48%,
          transparent 33.48%,
          transparent 66.48%,
          rgba(255,255,255,.27) 66.48%,
          rgba(255,255,255,.27) 66.81%,
          transparent 66.81%),
        linear-gradient(0deg,
          transparent 33.15%,
          rgba(255,255,255,.27) 33.15%,
          rgba(255,255,255,.27) 33.48%,
          transparent 33.48%,
          transparent 66.48%,
          rgba(255,255,255,.27) 66.48%,
          rgba(255,255,255,.27) 66.81%,
          transparent 66.81%);
      transition: opacity .16s ease;
    }

    .focus-box {
      position: absolute;
      left: 50%;
      top: 50%;
      width: calc(var(--u) * 16);
      height: calc(var(--u) * 16);
      transform: translate(-50%, -50%);
      border: max(1px, calc(var(--u) * .42)) solid var(--yellow);
      border-radius: calc(var(--u) * .9);
      opacity: .96;
      z-index: 4;
      pointer-events: none;
      animation: focus-pulse 2.4s ease-in-out infinite;
    }

    .focus-box::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: calc(var(--u) * 1.5);
      height: calc(var(--u) * 1.5);
      border-radius: 50%;
      background: var(--yellow);
      transform: translate(-50%, -50%);
    }

    @keyframes focus-pulse {
      0%,100% { transform: translate(-50%,-50%) scale(1); opacity: .96; }
      50% { transform: translate(-50%,-50%) scale(.94); opacity: .72; }
    }

    .camera-ui {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      transition: opacity .16s ease, transform .2s ease;
    }

    .camera-ui.hidden,
    .grid.hidden,
    .focus-box.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .top-bar {
      position: absolute;
      top: max(calc(var(--u) * 8.5), env(safe-area-inset-top));
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 calc(var(--u) * 5);
      pointer-events: auto;
    }

    .icon-btn {
      width: calc(var(--u) * 8);
      height: calc(var(--u) * 8);
      color: white;
      background: transparent;
      display: grid;
      place-items: center;
      border-radius: 50%;
      cursor: pointer;
    }

    .icon-btn.center {
      width: calc(var(--u) * 7);
      height: calc(var(--u) * 7);
      background: rgba(255,255,255,.14);
      backdrop-filter: blur(10px);
    }

    .icon-btn svg {
      width: 78%;
      height: 78%;
    }

    .bottom-area {
      position: absolute;
      left: 0;
      bottom: max(calc(var(--u) * 7.5), env(safe-area-inset-bottom));
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: auto;
    }

    .modes {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: calc(var(--u) * 5.2);
      margin-bottom: calc(var(--u) * 8.5);
      padding: 0 calc(var(--u) * 2);
      white-space: nowrap;
    }

    .mode-btn {
      min-width: calc(var(--u) * 5);
      color: var(--ui-dim);
      background: transparent;
      font-size: calc(var(--u) * 3.55);
      font-weight: 600;
      letter-spacing: -.03em;
      cursor: pointer;
      transition: color .18s ease, transform .15s ease;
    }

    .mode-btn:active {
      transform: scale(.9);
    }

    .mode-btn.active {
      color: var(--yellow);
    }

    .gallery-nav {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      opacity: 0;
      transition: opacity .22s ease;
    }

    .gallery-nav.visible {
      opacity: 1;
    }

    .gallery-arrow {
      position: absolute;
      top: 50%;
      width: 44px;
      height: 58px;
      transform: translateY(-50%);
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: rgba(0,0,0,.28);
      color: rgba(255,255,255,.92);
      backdrop-filter: blur(10px);
      pointer-events: auto;
      cursor: pointer;
    }

    .gallery-arrow.prev { left: 12px; }
    .gallery-arrow.next { right: 12px; }

    .gallery-arrow:disabled {
      display: none;
    }

    .gallery-arrow svg {
      width: 24px;
      height: 24px;
    }

    .app.captured .focus-box {
      display: none !important;
    }

    .gallery-counter {
      position: absolute;
      left: 50%;
      top: max(18px, env(safe-area-inset-top));
      transform: translateX(-50%);
      padding: 6px 11px;
      border-radius: 999px;
      color: rgba(255,255,255,.94);
      background: rgba(0,0,0,.34);
      font-size: 13px;
      font-weight: 650;
      letter-spacing: .02em;
      backdrop-filter: blur(10px);
    }

    .controls {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 calc(var(--u) * 9);
    }

    .thumbnail {
      justify-self: start;
      width: calc(var(--u) * 11.2);
      height: calc(var(--u) * 11.2);
      border-radius: calc(var(--u) * 1.4);
      background-position: center;
      background-size: cover;
      border: max(1px, calc(var(--u) * .25)) solid rgba(255,255,255,.45);
      overflow: hidden;
    }

    .shutter {
      position: relative;
      width: calc(var(--u) * 18);
      height: calc(var(--u) * 18);
      border-radius: 50%;
      background: white;
      border: calc(var(--u) * .8) solid #000;
      box-shadow: 0 0 0 calc(var(--u) * 1.05) white;
      cursor: pointer;
      transition: transform .09s ease, opacity .2s ease;
      touch-action: manipulation;
    }

    .shutter:active {
      transform: scale(.9);
    }

    .shutter:disabled {
      cursor: default;
      opacity: .65;
    }

    .flip {
      justify-self: end;
      width: calc(var(--u) * 11.2);
      height: calc(var(--u) * 11.2);
      display: grid;
      place-items: center;
      color: white;
      border-radius: 50%;
      background: rgba(255,255,255,.14);
      backdrop-filter: blur(10px);
      cursor: pointer;
    }

    .flip svg {
      width: 52%;
      height: 52%;
    }

    .flash {
      position: absolute;
      inset: 0;
      z-index: 20;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }

    .flash.active {
      animation: flash .68s ease-out both;
    }

    @keyframes flash {
      0% { opacity: 0; }
      9% { opacity: 1; }
      24% { opacity: .92; }
      100% { opacity: 0; }
    }

    .result-actions {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(20px);
      z-index: 80;
      display: flex;
      gap: 10px;
      width: max-content;
      max-width: calc(100vw - 24px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease, transform .3s var(--ease-out);
    }

    .result-actions.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }

    .result-action {
      min-width: 108px;
      padding: 11px 17px;
      border-radius: 999px;
      color: #fff;
      font-size: 14px;
      font-weight: 650;
      letter-spacing: -.02em;
      backdrop-filter: blur(14px);
      cursor: pointer;
      transition: transform .12s ease, opacity .2s ease;
    }

    .result-action:active {
      transform: scale(.96);
    }

    .restart {
      background: rgba(15,15,15,.68);
      border: 1px solid rgba(255,255,255,.14);
    }

    .save-photo {
      background: rgba(0,122,255,.88);
      border: 1px solid rgba(255,255,255,.22);
    }

    .save-photo:disabled {
      opacity: .55;
      cursor: default;
    }

    .error {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 28px;
      color: white;
      text-align: center;
      line-height: 1.55;
      background: #111;
      z-index: 50;
    }

    .error.show {
      display: grid;
    }


    /* 방셀 제작기 입력 패널 */
    .bangsel-panel {
      position: absolute;
      left: 14px;
      right: 14px;
      top: 72px;
      z-index: 12;
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 16px;
      background: rgba(12,12,14,.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 10px 28px rgba(0,0,0,.25);
      transition: opacity .22s ease, transform .22s ease;
    }

    .app.captured .bangsel-panel {
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
    }

    .bangsel-panel-title {
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .bangsel-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .bangsel-input,
    .bangsel-select {
      width: 100%;
      min-width: 0;
      height: 34px;
      padding: 0 10px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 10px;
      outline: none;
      color: #fff;
      background: rgba(255,255,255,.09);
      font-size: 12px;
      box-sizing: border-box;
    }

    .bangsel-input::placeholder {
      color: rgba(255,255,255,.53);
    }

    .bangsel-message {
      grid-column: 1 / -1;
    }

    .bangsel-preview {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      opacity: 0;
      transition: opacity .25s ease;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,.72);
    }

    .app.captured .bangsel-preview {
      opacity: 1;
    }

    .bangsel-gradient {
      position: absolute;
      inset: auto 0 0;
      height: 43%;
      background: linear-gradient(to top, rgba(0,0,0,.88), rgba(0,0,0,.24) 64%, transparent);
    }

    .bangsel-content {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 86px;
      text-align: center;
    }

    .bangsel-to {
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 700;
      opacity: .9;
    }

    .bangsel-nickname {
      font-size: 30px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -.05em;
      overflow-wrap: anywhere;
    }

    .bangsel-balloons {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 8px;
      padding: 6px 11px;
      border-radius: 999px;
      background: rgba(255,69,96,.88);
      font-size: 13px;
      font-weight: 800;
    }

    .bangsel-message-preview {
      margin-top: 12px;
      font-size: 15px;
      line-height: 1.45;
      font-weight: 650;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .bangsel-footer {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      font-weight: 700;
      opacity: .86;
    }

    .bangsel-watermark {
      letter-spacing: .04em;
    }

    @media (prefers-reduced-motion: reduce) {
      .photo.loaded,
      .focus-box {
        animation: none;
      }

      .app.captured .photo {
        animation-duration: .01ms;
      }
    }
  </style>
</head>

<body>
  <!--
    SOOP 방셀 제작기 v5.0
    아래 CONFIG.MODES의 images 배열과 SOUND_URL을 설정하면 됩니다.
  -->
  <script>
    const CONFIG = {
      /*
        각 항목의 images 배열에 사진 주소를 차례대로 넣으세요.
        배열이 비어 있거나 모든 사진을 불러오지 못하면 해당 번호는 화면에서 숨겨집니다.

        예:
        images: [
          "assets/images/photo-01.jpg",
          "https://example.com/photo-02.jpg"
        ]

        로컬 상대 경로와 외부 URL을 함께 사용할 수 있습니다.
        현재 기본 연결 주소는 모두 제거되어 있습니다.
      */
      MODES: [
        {
          id: "photo1",
          name: "포토1",
          text: "포토1",
          images: ["assets/images/photo.jpg"]
        },
        {
          id: "photo2",
          name: "포토2",
          text: "포토2",
          images: ["assets/images/photo.jpg"]
        },
        {
          id: "photo3",
          name: "포토3",
          text: "포토3",
          images: ["assets/images/photo.jpg"]
        },
        {
          id: "photo4",
          name: "포토4",
          text: "포토4",
          images: ["assets/images/photo.jpg"]
        },
        {
          id: "photo5",
          name: "포토5",
          text: "포토5",
          images: ["assets/images/photo.jpg"]
        }
      ],
      DEFAULT_MODE_ID: "photo1",
      SOUND_URL: "https://t1.daumcdn.net/cfile/tistory/9945893F5FCA7D1B01",
      SHOW_RETAKE_BUTTON: true,
      RETAKE_BUTTON_TEXT: "다시 촬영",
      SHOW_SAVE_BUTTON: true,
      SAVE_BUTTON_TEXT: "사진 저장",
      SAVE_FILE_NAME_PREFIX: "SOOP-Bangsel"
    };
  </script>

  <!-- 실제 샤프닝을 위한 SVG 컨볼루션 필터 -->
  <svg width="0" height="0" aria-hidden="true" focusable="false"
       style="position:absolute;overflow:hidden">
    <filter id="soop-sharpen" x="-8%" y="-8%" width="116%" height="116%"
            color-interpolation-filters="sRGB">
      <feConvolveMatrix
        order="3"
        kernelMatrix="0 -0.45 0 -0.45 2.8 -0.45 0 -0.45 0"
        divisor="1"
        bias="0"
        targetX="1"
        targetY="1"
        edgeMode="duplicate"
        preserveAlpha="true" />
    </filter>
  </svg>

  <main class="app" id="app">
    <div class="stage">
      <div class="photo-frame" id="photoFrame">
        <img class="photo" id="mainImage" alt="촬영 이미지" draggable="false" />
        <div class="grid" id="grid"></div>
        <div class="focus-box" id="focusBox"></div>

        <div class="bangsel-preview" id="bangselPreview">
          <div class="bangsel-gradient"></div>
          <div class="bangsel-content">
            <div class="bangsel-to">TO.</div>
            <div class="bangsel-nickname" id="previewNickname">소중한 시청자님</div>
            <div class="bangsel-balloons" id="previewBalloons">🎈 1,000개</div>
            <div class="bangsel-message-preview" id="previewMessage">오늘도 함께해 주셔서 감사합니다 ♥</div>
          </div>
          <div class="bangsel-footer">
            <span id="previewDate"></span>
            <span class="bangsel-watermark" id="previewWatermark">SOOP CAMERA</span>
          </div>
        </div>

        <div class="flash" id="flash"></div>
      </div>

      <section class="camera-ui" id="cameraUi" aria-label="카메라 화면">
        <div class="top-bar">
          <button class="icon-btn" type="button" aria-label="플래시 끔">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.55">
              <circle cx="12" cy="12" r="10"/>
              <path d="M11 6.5 7.8 13H12l-1 4.7 5.1-7.1H12l2.2-4.1Z"/>
              <path d="m4.6 4.6 14.8 14.8"/>
            </svg>
          </button>

          <button class="icon-btn center" type="button" aria-label="상단 메뉴">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3">
              <path d="m6 15 6-6 6 6"/>
            </svg>
          </button>

          <button class="icon-btn" type="button" aria-label="라이브 포토">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.45">
              <circle cx="12" cy="12" r="2.4"/>
              <circle cx="12" cy="12" r="6" stroke-dasharray="2 2.8"/>
              <circle cx="12" cy="12" r="10"/>
            </svg>
          </button>
        </div>


        <div class="bangsel-panel" id="bangselPanel">
          <div class="bangsel-panel-title">방셀 정보</div>
          <div class="bangsel-row">
            <input class="bangsel-input" id="bangselNickname" maxlength="20"
                   placeholder="받는 분 닉네임" value="소중한 시청자님" />
            <input class="bangsel-input" id="bangselBalloons" maxlength="8"
                   inputmode="numeric" placeholder="별풍선 수" value="1000" />
            <input class="bangsel-input bangsel-message" id="bangselMessage" maxlength="70"
                   placeholder="짧은 감사 멘트" value="오늘도 함께해 주셔서 감사합니다 ♥" />
            <input class="bangsel-input" id="bangselWatermark" maxlength="24"
                   placeholder="BJ명 / 워터마크" value="SOOP CAMERA" />
            <select class="bangsel-select" id="bangselTheme" aria-label="방셀 테마">
              <option value="pink">핑크</option>
              <option value="blue">블루</option>
              <option value="gold">골드</option>
            </select>
          </div>
        </div>

        <div class="bottom-area">
          <div class="modes" id="modes" aria-label="촬영 모드"></div>

          <div class="controls">
            <div class="thumbnail" id="thumbnail" aria-hidden="true"></div>

            <button class="shutter" id="shutter" type="button"
                    aria-label="촬영"></button>

            <button class="flip" id="flip" type="button" aria-label="카메라 전환">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.65">
                <path d="M19.5 9A8 8 0 0 0 5 6.1"/>
                <path d="m5 2.8.1 3.4 3.4-.1"/>
                <path d="M4.5 15A8 8 0 0 0 19 17.9"/>
                <path d="m19 21.2-.1-3.4-3.4.1"/>
              </svg>
            </button>
          </div>
        </div>
      </section>

      <div class="gallery-nav" id="galleryNav" aria-label="사진 넘기기">
        <button class="gallery-arrow prev" id="prevPhoto" type="button" aria-label="이전 사진">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3">
            <path d="m15 5-7 7 7 7"/>
          </svg>
        </button>
        <div class="gallery-counter" id="galleryCounter">1 / 1</div>
        <button class="gallery-arrow next" id="nextPhoto" type="button" aria-label="다음 사진">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3">
            <path d="m9 5 7 7-7 7"/>
          </svg>
        </button>
      </div>

      <div class="error" id="error">
        이미지를 불러오지 못했습니다.<br />
        CONFIG.MODES의 images 배열을 확인해 주세요.
      </div>
    </div>
  </main>

  <div class="result-actions" id="resultActions" aria-label="촬영 결과 메뉴">
    <button class="result-action save-photo" id="savePhoto" type="button">사진 저장</button>
    <button class="result-action restart" id="restart" type="button">다시 촬영</button>
  </div>

  <script>
    (() => {
      "use strict";

      const app = document.getElementById("app");
      const image = document.getElementById("mainImage");
      const thumbnail = document.getElementById("thumbnail");
      const shutter = document.getElementById("shutter");
      const resultActions = document.getElementById("resultActions");
      const savePhoto = document.getElementById("savePhoto");
      const restart = document.getElementById("restart");
      const cameraUi = document.getElementById("cameraUi");
      const grid = document.getElementById("grid");
      const focusBox = document.getElementById("focusBox");
      const flash = document.getElementById("flash");
      const error = document.getElementById("error");
      const modesElement = document.getElementById("modes");
      const galleryNav = document.getElementById("galleryNav");
      const galleryCounter = document.getElementById("galleryCounter");
      const prevPhoto = document.getElementById("prevPhoto");
      const nextPhoto = document.getElementById("nextPhoto");
      const bangselNickname = document.getElementById("bangselNickname");
      const bangselBalloons = document.getElementById("bangselBalloons");
      const bangselMessage = document.getElementById("bangselMessage");
      const bangselWatermark = document.getElementById("bangselWatermark");
      const bangselTheme = document.getElementById("bangselTheme");
      const previewNickname = document.getElementById("previewNickname");
      const previewBalloons = document.getElementById("previewBalloons");
      const previewMessage = document.getElementById("previewMessage");
      const previewDate = document.getElementById("previewDate");
      const previewWatermark = document.getElementById("previewWatermark");


      let captured = false;
      let shutterSound = null;
      let availableModes = [];
      let currentModeIndex = 0;
      let currentPhotoIndex = 0;
      let touchStartX = null;

      restart.textContent = CONFIG.RETAKE_BUTTON_TEXT || "다시 촬영";
      savePhoto.textContent = CONFIG.SAVE_BUTTON_TEXT || "사진 저장";
      savePhoto.hidden = CONFIG.SHOW_SAVE_BUTTON === false;

      function normalizeMode(mode, index) {
        return {
          id: mode.id || `mode-${index + 1}`,
          name: mode.name || `모드 ${index + 1}`,
          text: String(mode.text ?? index + 1),
          images: Array.isArray(mode.images)
            ? mode.images.filter(url => typeof url === "string" && url.trim())
            : []
        };
      }

      function checkImage(url) {
        return new Promise(resolve => {
          const tester = new Image();
          tester.onload = () => resolve(true);
          tester.onerror = () => resolve(false);
          tester.src = url;
        });
      }

      async function findWorkingImages(mode) {
        const checks = await Promise.all(
          mode.images.map(async url => ({ url, ok: await checkImage(url) }))
        );
        return {
          ...mode,
          images: checks.filter(item => item.ok).map(item => item.url)
        };
      }

      async function initializeAssets() {
        const normalized = (CONFIG.MODES || []).map(normalizeMode);
        const checked = await Promise.all(normalized.map(findWorkingImages));
        availableModes = checked.filter(mode => mode.images.length > 0);

        if (availableModes.length === 0) {
          error.innerHTML =
            "사용 가능한 사진 에셋이 없습니다.<br />" +
            "CONFIG.MODES의 images 배열을 확인해 주세요.";
          error.classList.add("show");
          shutter.disabled = true;
          return;
        }

        const defaultIndex = availableModes.findIndex(
          mode => mode.id === CONFIG.DEFAULT_MODE_ID
        );
        currentModeIndex = defaultIndex >= 0 ? defaultIndex : 0;
        currentPhotoIndex = 0;

        renderModeButtons();
        showCurrentPhoto({ animate: false });
        error.classList.remove("show");
        shutter.disabled = false;
      }

      function renderModeButtons() {
        modesElement.replaceChildren();

        availableModes.forEach((mode, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "mode-btn";
          button.textContent = mode.text;
          button.title = mode.name;
          button.setAttribute("aria-label", mode.name);
          button.dataset.modeIndex = String(index);

          if (index === currentModeIndex) {
            button.classList.add("active");
            button.setAttribute("aria-current", "true");
          }

          button.addEventListener("click", () => {
            selectMode(index);
          });

          modesElement.appendChild(button);
        });
      }

      function getCurrentMode() {
        return availableModes[currentModeIndex];
      }

      function getCurrentUrl() {
        const mode = getCurrentMode();
        return mode ? mode.images[currentPhotoIndex] : "";
      }

      function updateModeSelection() {
        [...modesElement.children].forEach((button, index) => {
          const active = index === currentModeIndex;
          button.classList.toggle("active", active);
          if (active) {
            button.setAttribute("aria-current", "true");
          } else {
            button.removeAttribute("aria-current");
          }
        });
      }

      function selectMode(index) {
        if (captured || index === currentModeIndex || !availableModes[index]) return;
        currentModeIndex = index;
        currentPhotoIndex = 0;
        updateModeSelection();
        showCurrentPhoto({ animate: true });
      }

      function updateGalleryUi() {
        const mode = getCurrentMode();
        const count = mode?.images.length || 0;
        galleryCounter.textContent = `${currentPhotoIndex + 1} / ${count}`;
        prevPhoto.disabled = count <= 1;
        nextPhoto.disabled = count <= 1;
        galleryNav.classList.toggle("visible", captured && count > 1);
      }

      function showCurrentPhoto({ animate = true } = {}) {
        const url = getCurrentUrl();
        if (!url) return;

        image.classList.remove("loaded", "sharp-final");
        image.style.opacity = "0";

        const applyImage = () => {
          thumbnail.style.backgroundImage = `url("${url}")`;
          image.style.opacity = "";
          if (captured) {
            image.classList.add("sharp-final");
          } else {
            image.classList.add("loaded");
          }
          updateGalleryUi();
        };

        image.onload = applyImage;
        image.onerror = () => {
          error.innerHTML =
            "사진을 불러오지 못했습니다.<br />" +
            "CONFIG.MODES의 이미지 주소를 확인해 주세요.";
          error.classList.add("show");
        };

        if (animate) {
          image.style.transition = "opacity .2s ease";
        }

        image.src = url;

        if (image.complete && image.naturalWidth > 0) {
          applyImage();
        }
      }

      function changePhoto(direction) {
        const mode = getCurrentMode();
        if (!mode || mode.images.length <= 1) return;

        const count = mode.images.length;
        currentPhotoIndex = (currentPhotoIndex + direction + count) % count;
        showCurrentPhoto({ animate: true });
      }

      try {
        shutterSound = new Audio(CONFIG.SOUND_URL);
        shutterSound.preload = "auto";
      } catch (_) {
        shutterSound = null;
      }

      function playShutterSound() {
        if (!shutterSound) return;
        try {
          shutterSound.currentTime = 0;
          const playPromise = shutterSound.play();
          if (playPromise && typeof playPromise.catch === "function") {
            playPromise.catch(() => {});
          }
        } catch (_) {}
      }


      function formatBalloonCount(value) {
        const digits = String(value || "").replace(/\D/g, "").slice(0, 8);
        return digits ? Number(digits).toLocaleString("ko-KR") : "0";
      }

      function getThemeColor() {
        return {
          pink: "#ff4560",
          blue: "#3587ff",
          gold: "#d9a52e"
        }[bangselTheme.value] || "#ff4560";
      }

      function updateBangselPreview() {
        previewNickname.textContent = bangselNickname.value.trim() || "소중한 시청자님";
        previewBalloons.textContent = `🎈 ${formatBalloonCount(bangselBalloons.value)}개`;
        previewBalloons.style.background = getThemeColor();
        previewMessage.textContent = bangselMessage.value.trim() || "오늘도 함께해 주셔서 감사합니다 ♥";
        previewWatermark.textContent = bangselWatermark.value.trim() || "SOOP CAMERA";
        previewDate.textContent = new Intl.DateTimeFormat("ko-KR", {
          year: "numeric", month: "2-digit", day: "2-digit"
        }).format(new Date());
      }

      function drawCoverImage(ctx, img, width, height) {
        const scale = Math.max(width / img.naturalWidth, height / img.naturalHeight);
        const drawWidth = img.naturalWidth * scale;
        const drawHeight = img.naturalHeight * scale;
        const x = (width - drawWidth) / 2;
        const y = (height - drawHeight) / 2;
        ctx.drawImage(img, x, y, drawWidth, drawHeight);
      }

      function wrapCanvasText(ctx, text, maxWidth) {
        const chars = Array.from(text);
        const lines = [];
        let line = "";
        for (const char of chars) {
          const test = line + char;
          if (ctx.measureText(test).width > maxWidth && line) {
            lines.push(line);
            line = char;
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
        return lines.slice(0, 3);
      }

      async function makeBangselBlob() {
        const canvas = document.createElement("canvas");
        canvas.width = 450;
        canvas.height = 800;
        const ctx = canvas.getContext("2d");

        drawCoverImage(ctx, image, canvas.width, canvas.height);

        const gradient = ctx.createLinearGradient(0, 440, 0, 800);
        gradient.addColorStop(0, "rgba(0,0,0,0)");
        gradient.addColorStop(.45, "rgba(0,0,0,.28)");
        gradient.addColorStop(1, "rgba(0,0,0,.9)");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 390, 450, 410);

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#fff";
        ctx.shadowColor = "rgba(0,0,0,.75)";
        ctx.shadowBlur = 10;
        ctx.shadowOffsetY = 2;

        ctx.font = "700 13px sans-serif";
        ctx.fillText("TO.", 225, 540);

        const nickname = bangselNickname.value.trim() || "소중한 시청자님";
        ctx.font = "900 30px sans-serif";
        ctx.fillText(nickname, 225, 579, 390);

        const balloonText = `🎈 ${formatBalloonCount(bangselBalloons.value)}개`;
        ctx.font = "800 13px sans-serif";
        const pillWidth = Math.min(210, ctx.measureText(balloonText).width + 28);
        ctx.shadowBlur = 0;
        ctx.fillStyle = getThemeColor();
        ctx.beginPath();
        ctx.roundRect(225 - pillWidth / 2, 607, pillWidth, 30, 15);
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.fillText(balloonText, 225, 622);

        ctx.shadowBlur = 8;
        ctx.font = "650 15px sans-serif";
        const message = bangselMessage.value.trim() || "오늘도 함께해 주셔서 감사합니다 ♥";
        const lines = wrapCanvasText(ctx, message, 390);
        lines.forEach((line, index) => ctx.fillText(line, 225, 663 + index * 23));

        ctx.shadowBlur = 5;
        ctx.font = "700 11px sans-serif";
        const date = new Intl.DateTimeFormat("ko-KR", {
          year: "numeric", month: "2-digit", day: "2-digit"
        }).format(new Date());
        ctx.textAlign = "left";
        ctx.fillText(date, 18, 772);
        ctx.textAlign = "right";
        ctx.fillText((bangselWatermark.value.trim() || "SOOP CAMERA"), 432, 772, 220);

        return await new Promise((resolve, reject) => {
          canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error("이미지 생성 실패")), "image/png", .95);
        });
      }

      function replayAnimation(element, className) {
        element.classList.remove(className);
        void element.offsetWidth;
        element.classList.add(className);
      }

      function capture() {
        if (captured || !image.complete || image.naturalWidth === 0) return;
        captured = true;
        shutter.disabled = true;

        playShutterSound();
        replayAnimation(flash, "active");

        window.setTimeout(() => {
          cameraUi.classList.add("hidden");
          grid.classList.add("hidden");
          focusBox.classList.add("hidden");

          image.classList.remove("loaded");
          void image.offsetWidth;
          app.classList.add("captured");

          window.setTimeout(() => {
            image.classList.add("sharp-final");
            updateGalleryUi();
          }, 1160);

          if (CONFIG.SHOW_RETAKE_BUTTON || CONFIG.SHOW_SAVE_BUTTON) {
            window.setTimeout(() => resultActions.classList.add("show"), 850);
          }
        }, 62);
      }

      function getExtension(url) {
        try {
          const pathname = new URL(url, location.href).pathname;
          const match = pathname.match(/\.([a-zA-Z0-9]{2,5})$/);
          return match ? match[1].toLowerCase() : "png";
        } catch (_) {
          return "png";
        }
      }

      function getDownloadFileName(url) {
        const mode = getCurrentMode();
        const prefix = (CONFIG.SAVE_FILE_NAME_PREFIX || "SOOP-Camera").trim();
        const modeName = mode?.name || "Photo";
        const number = String(currentPhotoIndex + 1).padStart(2, "0");
        return `${prefix}-${modeName}-${number}.${getExtension(url)}`;
      }

      function triggerBlobDownload(blob, fileName) {
        const objectUrl = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = objectUrl;
        anchor.download = fileName;
        anchor.style.display = "none";
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        window.setTimeout(() => URL.revokeObjectURL(objectUrl), 1500);
      }

      async function saveCurrentPhoto() {
        const url = getCurrentUrl();
        if (!captured || !url || savePhoto.disabled) return;

        savePhoto.disabled = true;
        const originalText = savePhoto.textContent;
        savePhoto.textContent = "방셀 제작 중...";

        try {
          const blob = await makeBangselBlob();
          const nickname = (bangselNickname.value.trim() || "viewer")
            .replace(/[\/:*?"<>|]/g, "_")
            .slice(0, 20);
          triggerBlobDownload(blob, `SOOP-방셀-${nickname}-${Date.now()}.png`);
          savePhoto.textContent = "저장 완료";
        } catch (error) {
          console.error(error);
          savePhoto.textContent = "저장 실패";
        } finally {
          window.setTimeout(() => {
            savePhoto.disabled = false;
            savePhoto.textContent = originalText;
          }, 1400);
        }
      }

      function resetCamera() {
        captured = false;
        resultActions.classList.remove("show");
        galleryNav.classList.remove("visible");
        app.classList.remove("captured");
        image.classList.remove("sharp-final");

        requestAnimationFrame(() => {
          cameraUi.classList.remove("hidden");
          grid.classList.remove("hidden");
          focusBox.classList.remove("hidden");
          image.classList.add("loaded");
          shutter.disabled = false;
        });
      }


      [bangselNickname, bangselBalloons, bangselMessage, bangselWatermark].forEach(input => {
        input.addEventListener("input", updateBangselPreview);
      });
      bangselTheme.addEventListener("change", updateBangselPreview);
      updateBangselPreview();

      shutter.addEventListener("click", capture);
      savePhoto.addEventListener("click", saveCurrentPhoto);
      restart.addEventListener("click", resetCamera);
      prevPhoto.addEventListener("click", () => changePhoto(-1));
      nextPhoto.addEventListener("click", () => changePhoto(1));

      image.addEventListener("touchstart", event => {
        if (!captured || event.touches.length !== 1) return;
        touchStartX = event.touches[0].clientX;
      }, { passive: true });

      image.addEventListener("touchend", event => {
        if (!captured || touchStartX === null) return;
        const endX = event.changedTouches[0]?.clientX ?? touchStartX;
        const delta = endX - touchStartX;
        touchStartX = null;

        if (Math.abs(delta) >= 45) {
          changePhoto(delta < 0 ? 1 : -1);
        }
      }, { passive: true });

      window.addEventListener("keydown", event => {
        if ((event.key === "Enter" || event.key === " ") && !captured) {
          event.preventDefault();
          capture();
        } else if (event.key === "Escape" && captured) {
          resetCamera();
        } else if (captured && event.key === "ArrowLeft") {
          changePhoto(-1);
        } else if (captured && event.key === "ArrowRight") {
          changePhoto(1);
        }
      });

      flash.addEventListener("animationend", () => {
        flash.classList.remove("active");
      });

      initializeAssets();
    })();
  </script>
</body>
</html>
